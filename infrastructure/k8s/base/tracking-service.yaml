apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking-service
  namespace: bookaholic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracking-service
  template:
    metadata:
      labels:
        app: tracking-service
    spec:
      containers:
        - name: tracking-service
          image: bookaholic-tracking-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: bookaholic-config
                  key: MONGO_URI_TRACKING
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bookaholic-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: tracking-service
  namespace: bookaholic
spec:
  selector:
    app: tracking-service
  ports:
    - port: 5003
      targetPort: 5003
