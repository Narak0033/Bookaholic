apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: bookaholic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: bookaholic-auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: bookaholic-config
                  key: MONGO_URI_AUTH
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bookaholic-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "7d"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: bookaholic
spec:
  selector:
    app: auth-service
  ports:
    - port: 5001
      targetPort: 5001
