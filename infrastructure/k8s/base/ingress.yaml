apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookaholic-ingress
  namespace: bookaholic
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: bookaholic.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 4000
